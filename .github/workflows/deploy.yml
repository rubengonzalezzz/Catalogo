name: Deploy Vite site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Importante: Si tu proyecto está en la subcarpeta 'mi-catalogo', 
          # apunta hacia allá el cache
          cache-dependency-path: mi-catalogo/package-lock.json

      - name: Install dependencies
        run: cd mi-catalogo && npm install

      - name: Build
        run: cd mi-catalogo && npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Aquí le decimos que suba la carpeta 'dist' que crea Vite
          path: './mi-catalogo/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
